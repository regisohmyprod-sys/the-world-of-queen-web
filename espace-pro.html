<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Espace Pro — THE WORLD OF QUEEN</title>
<meta name="description" content="Espace professionnel TWOQ — Booking, programmation, partenariats." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --noir: #0A0A0A; --charcoal: #141414;
    --gold: #D4AF37; --gold-pale: #F0D77A;
    --cramoisi: #8B0000; --cream: #F5F1E8; --smoke: #8B8580;
    --serif: 'Cinzel', serif; --sans: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--noir); color: var(--cream); font-family: var(--sans); min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  /* HEADER */
  .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,175,55,0.15); }
  .header-inner { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: flex-start; gap: 50px; position: relative; min-height: 60px; }
  .brand { font-family: var(--serif); color: var(--gold); font-size: 16px; letter-spacing: 3px; font-weight: 600; line-height: 1.1; position: absolute; left: 24px; top: 50%; transform: translateY(-50%); text-decoration: none; transition: filter 0.2s, text-shadow 0.2s; cursor: pointer; }
  .brand:hover { filter: brightness(1.15); text-shadow: 0 0 14px rgba(212,175,55,0.45); }
  .brand:hover small { color: var(--gold); }
  .brand small { display: block; font-family: var(--sans); color: var(--cream); font-size: 9px; letter-spacing: 4px; font-weight: 400; margin-top: 2px; opacity: 0.8; }
  .menu-toggle { display: none; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 6px; padding: 6px 12px; font-size: 18px; cursor: pointer; }
  nav.main-nav { display: flex; gap: 22px; align-items: center; }
  nav.main-nav a { color: var(--cream); font-size: 12px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; transition: color 0.2s; padding: 6px 0; border-bottom: 2px solid transparent; }
  nav.main-nav a:hover { color: var(--gold); border-bottom-color: var(--gold); }
  .nav-dropdown { position: relative; }
  .nav-dropdown-toggle { color: var(--gold); font-size: 12px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; cursor: pointer; padding: 6px 0; border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 5px; user-select: none; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; transition: border-color 0.2s; }
  .nav-dropdown-toggle:hover { border-bottom-color: var(--gold); }
  .nav-dropdown-toggle .chev { font-size: 9px; transition: transform 0.2s; }
  .nav-dropdown.open .nav-dropdown-toggle .chev { transform: rotate(180deg); }
  .nav-dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; min-width: 200px; background: rgba(10,10,10,0.98); border: 1px solid rgba(212,175,55,0.35); border-radius: 12px; padding: 6px; display: none; flex-direction: column; gap: 2px; box-shadow: 0 14px 36px rgba(0,0,0,0.7), 0 0 30px rgba(212,175,55,0.1); z-index: 200; }
  .nav-dropdown.open .nav-dropdown-menu, .nav-dropdown:hover .nav-dropdown-menu { display: flex; }
  .nav-dropdown-menu a { color: var(--cream) !important; font-size: 11px !important; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; padding: 10px 14px !important; border-radius: 8px; border-bottom: none !important; transition: background 0.15s, color 0.15s; white-space: nowrap; }
  .nav-dropdown-menu a:hover { background: rgba(212,175,55,0.15); color: var(--gold) !important; }
  @media (max-width: 980px) {
    .header-inner { justify-content: space-between; }
    .brand { position: static; transform: none; }
    .menu-toggle { display: block; }
    nav.main-nav { position: absolute; top: 100%; right: 0; background: rgba(10,10,10,0.98); flex-direction: column; gap: 0; padding: 14px 20px; border-radius: 0 0 0 12px; border-left: 1px solid rgba(212,175,55,0.15); border-bottom: 1px solid rgba(212,175,55,0.15); max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    nav.main-nav.open { max-height: 90vh; }
    nav.main-nav a { padding: 12px 0; width: 100%; border-bottom: 1px solid rgba(212,175,55,0.10); }
    .nav-dropdown { width: 100%; }
    .nav-dropdown-toggle { width: 100%; justify-content: space-between; padding: 12px 0 !important; border-bottom: 1px solid rgba(212,175,55,0.10) !important; }
    .nav-dropdown-menu { position: static; background: rgba(0,0,0,0.4); margin: 4px 0 8px; width: 100%; border: none; border-left: 2px solid rgba(212,175,55,0.3); border-radius: 0; padding: 4px 0 4px 14px; box-shadow: none; }
    .nav-dropdown-menu a { padding: 8px 0 !important; }
  }

  /* CIEL ÉTOILÉ */
  .twinkle-stars { position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; }
  .twinkle-star { position: absolute; background: #F0D77A; border-radius: 50%; opacity: 0; animation: twinkle 4s infinite ease-in-out; box-shadow: 0 0 4px #D4AF37, 0 0 8px rgba(240,215,122,0.5); }
  @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.6); } 50% { opacity: 1; transform: scale(1.3); } }
  .twinkle-star.big { width: 4px; height: 4px; box-shadow: 0 0 8px #D4AF37, 0 0 18px rgba(240,215,122,0.9); }
  .twinkle-star.medium { width: 2.5px; height: 2.5px; box-shadow: 0 0 5px #D4AF37, 0 0 12px rgba(240,215,122,0.7); }
  .twinkle-star.small { width: 1.5px; height: 1.5px; }

  /* PAGE */
  .coming-soon-page { position: relative; overflow: hidden; background: #000; padding: 110px 20px 60px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .coming-soon-page::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(212,175,55,0.12) 0%, transparent 60%); z-index: 0; pointer-events: none; }

  .cs-content { position: relative; z-index: 2; max-width: 700px; text-align: center; }
  .cs-icon { width: 130px; height: 130px; margin: 0 auto 30px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 56px; background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%); box-shadow: 0 0 60px rgba(212,175,55,0.3); animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(212,175,55,0.3); } 50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(212,175,55,0.5); } }
  .cs-eyebrow { color: var(--gold); font-size: 12px; letter-spacing: 5px; font-weight: 700; margin-bottom: 14px; }
  .cs-title { font-family: var(--serif); color: var(--cream); font-size: clamp(38px, 6vw, 60px); font-weight: 500; letter-spacing: 2px; margin-bottom: 20px; text-shadow: 0 0 30px rgba(212,175,55,0.4); }
  .cs-subtitle { color: var(--gold-pale); font-size: 16px; font-style: italic; margin-bottom: 30px; line-height: 1.5; }
  .cs-text { color: var(--cream); font-size: 14px; line-height: 1.8; max-width: 540px; margin: 0 auto 40px; opacity: 0.9; }
  .cs-text strong { color: var(--gold); }

  .cs-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  @media (max-width: 600px) { .cs-cards { grid-template-columns: 1fr; } }
  .cs-card { background: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.95)); border: 1px solid rgba(212,175,55,0.25); border-radius: 14px; padding: 20px 18px; text-align: left; transition: border-color 0.2s, transform 0.2s; }
  .cs-card:hover { border-color: var(--gold); transform: translateY(-3px); }
  .cs-card-icon { font-size: 26px; margin-bottom: 8px; }
  .cs-card-title { color: var(--cream); font-size: 14px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; }
  .cs-card-text { color: var(--smoke); font-size: 12px; line-height: 1.5; }
  a.cs-card { display: block; cursor: pointer; }
  a.cs-card:hover .cs-card-cta { color: var(--gold-pale); }
  .cs-card-cta { color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 1px; margin-top: 12px; transition: color 0.2s; }

  .cs-cta { display: inline-block; background: var(--gold); color: var(--noir); padding: 14px 30px; border-radius: 999px; font-family: inherit; font-size: 14px; letter-spacing: 1.5px; font-weight: 700; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
  .cs-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(212,175,55,0.35); }
  .cs-helper { color: var(--smoke); font-size: 12px; margin-top: 20px; font-style: italic; }

  /* MODALE DOSSIER TECHNIQUE */
  .dt-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .dt-overlay.open { display: flex; }
  .dt-modal { background: var(--charcoal); border: 1px solid rgba(212,175,55,0.4); border-radius: 18px; max-width: 460px; width: 100%; padding: 32px 26px 26px; position: relative; box-shadow: 0 24px 60px rgba(0,0,0,0.6); max-height: 85vh; overflow-y: auto; animation: dtIn 0.25s ease; text-align: center; }
  @keyframes dtIn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
  .dt-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--smoke); font-size: 26px; cursor: pointer; line-height: 1; transition: color 0.2s; }
  .dt-close:hover { color: var(--gold); }
  .dt-eyebrow { color: var(--gold); font-size: 11px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
  .dt-title { font-family: var(--serif); color: var(--cream); font-size: 23px; margin-bottom: 5px; letter-spacing: 1px; }
  .dt-sub { color: var(--smoke); font-size: 12px; margin-bottom: 22px; }
  .dt-option { display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; background: linear-gradient(180deg, rgba(20,20,20,0.85), rgba(10,10,10,0.95)); border: 1px solid rgba(212,175,55,0.25); border-radius: 12px; padding: 15px 16px; margin-bottom: 11px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; font-family: inherit; color: var(--cream); text-decoration: none; }
  .dt-option:hover { border-color: var(--gold); transform: translateY(-2px); }
  .dt-option-icon { font-size: 23px; flex-shrink: 0; }
  .dt-option-body { flex: 1; display: flex; flex-direction: column; }
  .dt-option-title { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; color: var(--cream); }
  .dt-option-meta { font-size: 11px; color: var(--smoke); margin-top: 3px; }
  .dt-soon { font-size: 11px; color: var(--smoke); font-style: italic; margin-top: 3px; }
  .dt-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; flex-shrink: 0; white-space: nowrap; }
  .dt-badge.live { background: rgba(212,175,55,0.18); color: var(--gold); border: 1px solid rgba(212,175,55,0.5); }
  .dt-badge.done { background: rgba(139,133,128,0.15); color: var(--smoke); border: 1px solid rgba(139,133,128,0.35); }
  .dt-option.disabled { opacity: 0.5; cursor: not-allowed; }
  .dt-option.disabled:hover { border-color: rgba(212,175,55,0.25); transform: none; }
  .dt-back { background: none; border: none; color: var(--gold); font-size: 12px; letter-spacing: 1px; cursor: pointer; margin-bottom: 16px; padding: 0; font-family: inherit; font-weight: 600; display: block; }
  .dt-back:hover { color: var(--gold-pale); }

  /* FOOTER MAIL BUTTON */
  .footer-mail-btn { display: inline-block !important; margin-top: 8px; padding: 8px 16px !important; background: rgba(212, 175, 55, 0.08); border: 1px solid var(--gold); border-radius: 999px; color: var(--gold) !important; font-size: 12px !important; letter-spacing: 1px; font-weight: 600; text-decoration: none; transition: background 0.2s, transform 0.2s; opacity: 1 !important; }
  .footer-mail-btn:hover { background: var(--gold); color: var(--noir) !important; transform: translateY(-2px); }

  /* FOOTER */
  footer { background: #050505; padding: 50px 20px 24px; position: relative; z-index: 3; }
  .footer-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; }
  .footer-col h5 { color: var(--gold); font-size: 12px; letter-spacing: 4px; font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
  .footer-col p, .footer-col a { color: var(--cream); font-size: 13px; line-height: 1.8; opacity: 0.85; display: block; }
  .footer-col a:hover { color: var(--gold); opacity: 1; }
  .footer-bottom { border-top: 1px solid rgba(212,175,55,0.1); margin-top: 36px; padding-top: 20px; text-align: center; color: var(--smoke); font-size: 11px; letter-spacing: 1px; }
  .gold-bottom { color: var(--gold); font-weight: 700; }
  @media (max-width: 768px) { .footer-inner { grid-template-columns: 1fr 1fr; gap: 26px; } }
  @media (max-width: 500px) { .footer-inner { grid-template-columns: 1fr; gap: 22px; } }





  /* ============ 🎨 CHARTE TYPOGRAPHIQUE UNIFIÉE (toutes pages) ============ */
  /* IMPORTANT: ne s'applique PAS au header (.site-header) */

  /* H1 — Titres principaux de page (tous variants) */
  .hero-title, .page-title,
  main .moi-hero h1, .ct-hero h1, .boutique-hero h1, .medias-hero h1, .presse-hero h1, .contact-hero h1,
  .dates-hero-h1, .ct-hero-h1,
  section.hero h1, .hero-eyebrow + h1, .hero-content h1 {
    font-size: clamp(36px, 5.5vw, 52px) !important;
    line-height: 1.1 !important;
    letter-spacing: 2px !important;
  }
  /* H2 — Titres de section (hors header) */
  body .section-title, body .newsletter-title, body .boutique-title, body .category-title {
    font-size: clamp(26px, 4vw, 36px) !important;
    line-height: 1.15 !important;
    letter-spacing: 1px !important;
  }
  /* Sous-titres / hero subtitle */
  .hero-subtitle, .ct-hero-text, .moi-hero-sub, .dates-hero-sub,
  .boutique-subtitle, .presse-subtitle, .contact-subtitle {
    font-size: 14px !important;
    line-height: 1.65 !important;
  }
  /* Titres de cartes / sous-sections */
  .fan-card-title, .show-card-title, .artist-name, .shop-title,
  .live-card-title, .review-bubble .review-author,
  .reels-card-title, .backstage-card-real .backstage-cap-real,
  .product-title, .category-card-title, .perk-title, .feature-title,
  .resource-title, .info-title, .request-title {
    font-size: 18px !important;
    line-height: 1.3 !important;
    letter-spacing: 0.5px !important;
  }
  /* Eyebrows (hors header/nav) */
  main .section-eyebrow, .shop-eyebrow, .live-card-eyebrow,
  .reels-eyebrow, .accordion-eyebrow, .boutique-eyebrow,
  .category-eyebrow, .perk-eyebrow, main .hero-eyebrow,
  .ct-hero-eyebrow, .moi-hero-sub, .presse-eyebrow {
    font-size: 11px !important;
    letter-spacing: 4px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
  }
  /* Texte courant */
  .section-text, .fan-card-text, .show-card-text, .shop-text,
  .category-text, .perk-text, .request-text {
    font-size: 14px !important;
    line-height: 1.65 !important;
  }

  /* PROTECTION DU HEADER : tailles fixes pour le logo */
  .site-header .brand {
    font-size: 16px !important;
    letter-spacing: 2.5px !important;
    line-height: 1.2 !important;
  }
  .site-header .brand small {
    font-size: 9px !important;
    letter-spacing: 3px !important;
    line-height: 1.2 !important;
  }
  .site-header .main-nav a {
    font-size: 12px !important;
    letter-spacing: 1.5px !important;
  }
  /* ============ FIN CHARTE TYPOGRAPHIQUE ============ */

</style>
</head>

  <div class="twinkle-stars" id="twinkleStars"></div>

      Programmateurs, tourneurs, agents&nbsp;: tu
